<template>
    <div class="dashboard-root slds-p-around_medium">
        <div class="slds-page-header slds-m-bottom_medium">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:metrics" alternative-text="Metrics"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-page-header__title slds-truncate">Revenue dashboard</h1>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <c-dashboard-filters onfilterchange={handleFilterFromChild}></c-dashboard-filters>

        <template if:true={metricsError}>
            <div class="slds-m-top_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error">
                    <lightning-icon
                        icon-name="utility:error"
                        alternative-text="Error"
                        variant="inverse"
                        size="small"
                        class="slds-m-right_x-small"
                    ></lightning-icon>
                    Unable to load metrics. Confirm Opportunity field access.
                </div>
            </div>
        </template>

        <template if:true={locationError}>
            <div class="slds-m-top_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error">Unable to load account locations.</div>
            </div>
        </template>

        <template if:true={isBusy}>
            <div class="slds-is-relative slds-m-top_large slds-p-around_large">
                <lightning-spinner alternative-text="Loading metrics" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={hasMetrics}>
            <lightning-layout multiple-rows class="slds-m-top_medium">
                <lightning-layout-item size="12" class="slds-m-bottom_small">
                    <lightning-layout multiple-rows>
                        <lightning-layout-item flexibility="auto" padding="around-small" size="12" medium-device-size="6" large-device-size="3">
                            <article class="slds-tile slds-box metric-tile">
                                <h3 class="slds-text-heading_label slds-text-color_weak">Open opportunities</h3>
                                <p class="slds-text-heading_large">{metrics.openCount}</p>
                            </article>
                        </lightning-layout-item>
                        <lightning-layout-item flexibility="auto" padding="around-small" size="12" medium-device-size="6" large-device-size="3">
                            <article class="slds-tile slds-box metric-tile">
                                <h3 class="slds-text-heading_label slds-text-color_weak">Open pipeline</h3>
                                <p class={openPipelineClass}>
                                    <lightning-formatted-number
                                        value={metrics.openAmount}
                                        format-style="currency"
                                        currency-code="USD"
                                    ></lightning-formatted-number>
                                </p>
                            </article>
                        </lightning-layout-item>
                        <lightning-layout-item flexibility="auto" padding="around-small" size="12" medium-device-size="6" large-device-size="3">
                            <article class="slds-tile slds-box metric-tile">
                                <h3 class="slds-text-heading_label slds-text-color_weak">Won deals</h3>
                                <p class="slds-text-heading_large">{metrics.wonCount}</p>
                            </article>
                        </lightning-layout-item>
                        <lightning-layout-item flexibility="auto" padding="around-small" size="12" medium-device-size="6" large-device-size="3">
                            <article class="slds-tile slds-box metric-tile">
                                <h3 class="slds-text-heading_label slds-text-color_weak">Win rate</h3>
                                <p class={wonPulseClass}>{winRateDisplay}</p>
                                <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">Won / (won + lost)</p>
                            </article>
                        </lightning-layout-item>
                    </lightning-layout>
                </lightning-layout-item>

                <lightning-layout-item size="12" padding="around-small" class="slds-m-top_small">
                    <c-dashboard-card>
                        <span slot="title">Pipeline charts</span>
                        <span slot="subtitle">Open, won, and lost counts; amount by stage</span>
                        <c-dashboard-charts metrics={metrics}></c-dashboard-charts>
                    </c-dashboard-card>
                </lightning-layout-item>
            </lightning-layout>
        </template>

        <lightning-layout multiple-rows class="slds-m-top_medium">
            <lightning-layout-item size="12" padding="around-small">
                <c-dashboard-card>
                    <span slot="title">Account locations</span>
                    <span slot="subtitle">Billing geocodes; accounts match Opportunity filters when filters are set</span>
                    <template if:true={showMapWarning}>
                        <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            More than 500 geocoded accounts match; map shows the first 500.
                        </div>
                    </template>
                    <c-dashboard-map locations={mapLocations} summary={mapSummary}></c-dashboard-map>
                </c-dashboard-card>
            </lightning-layout-item>
        </lightning-layout>
    </div>
</template>
