<template>
    <div class="map-host">
        <template if:false={hasLocations}>
            <div class="slds-align_absolute-center slds-text-color_weak slds-p-around_large">
                No geocoded accounts match the current filters.
            </div>
        </template>
        <template if:true={hasLocations}>
            <div class="map-host__canvas leaflet-root" lwc:dom="manual"></div>
            <template if:true={summary}>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">{summary}</p>
            </template>
        </template>
    </div>
</template>
